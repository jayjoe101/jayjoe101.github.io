title: My Blog
description: A simple blog built from scratch
author: Jay E
baseurl: ""
url: "https://jay-e.dev"

# Jekyll settings
permalink: /:title/

# Custom blog collection
collections:
  blog:
    output: true
    permalink: /:title/

# ← NEW: Automatically apply dark post layout to every blog post
defaults:
  - scope:
      path: ""
      type: "blog"
    values:
      layout: "post"

# Future-proof
future: true