---
layout: default
---

<article class="max-w-3xl mx-auto">
  <!-- Post header -->
  <header class="mb-10 border-b border-zinc-800 pb-8">
    <h1 class="text-4xl font-bold tracking-tight">{{ page.title }}</h1>
    <time class="mt-3 block text-zinc-400 text-sm">
      {{ page.date | date: "%B %d, %Y" }}
    </time>
  </header>

  <!-- Main content - dark & readable -->
  <div class="text-zinc-100 text-[1.1rem] leading-relaxed tracking-[-0.01em] prose prose-invert max-w-none">
    {{ content }}
  </div>

  <!-- Back button -->
  <div class="mt-16 pt-8 border-t border-zinc-800">
    <a href="/" 
       class="inline-flex items-center gap-2 text-zinc-400 hover:text-white transition">
      ← Back to all posts
    </a>
  </div>
</article>
