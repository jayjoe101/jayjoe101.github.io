<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-zinc-950 text-zinc-200 font-sans">

    <!-- Sleek Persistent Navbar -->
    <nav class="sticky top-0 z-50 bg-zinc-950/95 backdrop-blur-md border-b border-zinc-800">
        <div class="max-w-3xl mx-auto px-6 py-5 flex items-center justify-between">
            <a href="/" class="text-2xl font-semibold tracking-tight hover:text-white transition">
                {{ site.title }}
            </a>
            
            <!-- Navigation tabs -->
            <div class="flex items-center gap-1">
                <a href="/" 
                   class="text-sm font-medium px-5 py-2 rounded-2xl hover:bg-zinc-900 transition">
                    Home
                </a>
                <a href="/info" 
                   class="text-sm font-medium px-5 py-2 rounded-2xl hover:bg-zinc-900 transition">
                    Info
                </a>
            </div>
        </div>
    </nav>

    <!-- Main content area -->
    <div class="max-w-3xl mx-auto px-6 py-10">
        {{ content }}
    </div>

</body>
</html>
